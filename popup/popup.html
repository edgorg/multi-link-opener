<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi Link Opener</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Multi Link Opener</h1>
        </header>

        <div class="instructions">
            <p>Select text containing links, then right-click and choose <strong>"Open links in selection"</strong></p>
        </div>

        <div class="settings-divider"></div>

        <div class="settings-section-title">Options</div>

        <div class="settings-list">
            <div class="settings-item" data-for="remove-duplicates">
                <span class="settings-item-content">
                    <span class="settings-item-label">Remove duplicates</span>
                    <span class="settings-item-description">Only open unique links</span>
                </span>
                <span class="toggle-switch-small">
                    <input type="checkbox" id="remove-duplicates" checked>
                    <span class="toggle-slider-small"></span>
                </span>
            </div>

            <div class="settings-item" data-for="focus-first-tab">
                <span class="settings-item-content">
                    <span class="settings-item-label">Focus first tab</span>
                    <span class="settings-item-description">Switch to the first opened link</span>
                </span>
                <span class="toggle-switch-small">
                    <input type="checkbox" id="focus-first-tab">
                    <span class="toggle-slider-small"></span>
                </span>
            </div>
        </div>

        <div class="settings-divider"></div>

        <div class="settings-section-title">Open links in</div>

        <div class="segmented-control" id="open-mode">
            <button class="segment active" data-value="normal" title="The current browser">Current</button>
            <button class="segment" data-value="group" title="Tab group in the current browser">Group</button>
            <button class="segment" data-value="window" title="A new browser window">New window</button>
        </div>

        <div class="settings-divider"></div>

        <div class="shortcut-section">
            <span class="settings-item-content">
                <span class="settings-item-label">Keyboard shortcut</span>
                <span class="settings-item-description" id="shortcut-display">Loading...</span>
            </span>
            <button class="change-shortcut-btn" id="change-shortcut" title="Change shortcut in Chrome settings">
                Change
            </button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
